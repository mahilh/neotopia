name: Bot Health Check

# Daily proof that NeoTopia is still mechanically playable by an autonomous agent: the bot drives a real
# game against production and we assert it PLACED elements that reached the database (Rule 53 · the DB is
# truth, not the proxy counter). A regression in the placement chain (force:true, the 4-step UI, sync) is
# caught here automatically. NOT on every push — the bot is a heavy headless-browser flow + does anon
# sign-ins (Supabase ~30/hr per IP); a daily cron keeps it well clear of the limit and off the merge path.
#
# FLOW MODE (T3 S18 · Task B): after the Classic placement check, a second bot run with BOT_MODE=flow drives
# the REAL Flow path — it clicks T1's lobby toggle (data-testid="mode-flow" · 5d759aa) before Create Room and
# DB-verifies the persisted mode (game_sessions.mode · migration 010 · bot v4.6). This guards the toggle from
# silent regression: if the toggle vanishes/renames, the bot falls back to Classic and the Flow grader FAILS.
#
# TOLERANCE (per T2 S13/S14 · the bot-room lifecycle race): a bot room can be purged (migration 008 sweeps
# Bot% rooms of any status) before dbPlacedCount reads it → summary.totalPlacedDB comes back null for that
# game. So we run BOT_GAMES=3 ("assert over N, not 1") and grade gently:
#   · totalPlacedDB  > 0            → PASS  (DB-confirmed machine placement · the real health signal)
#   · totalPlacedDB == null & proxy > 0 → SOFT-PASS (bot placed, but every room was raced-out before the DB
#                                          read · environmental · re-run to DB-verify · see T3 S14 Task B)
#   · proxy == 0  (nothing placed) → FAIL  (genuine placement regression)
#   · totalPlacedDB == 0 (rooms readable, 0 placed) → FAIL (genuine regression)
#
# REQUIRES repo secrets VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY (the bot loads them for its DB read).

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch: {}    # manual trigger from the Actions tab

concurrency:
  group: bot-health        # never overlap two bot-health runs (each other's rooms would purge-collide)
  cancel-in-progress: false

jobs:
  bot-health:
    name: Autonomous play · DB-verified placement
    runs-on: ubuntu-latest
    timeout-minutes: 20   # +5 over the Classic-only budget for the extra BOT_MODE=flow game (T3 S18 · Task B)
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      BOT_GAMES: '3'
      BOT_TURNS: '20'
      BOT_URL: https://neotopia.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run bot simulation (3 games vs production)
        run: node scripts/bot-simulate.js

      - name: Assert DB-verified machine placement
        run: |
          node -e '
            const fs = require("fs");
            const dir = ".bot-reports";
            const files = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => f.startsWith("report-")).sort() : [];
            if (!files.length) { console.error("FAIL: the bot produced no report — it likely crashed before finishing."); process.exit(1); }
            const r = JSON.parse(fs.readFileSync(dir + "/" + files.at(-1), "utf8"));
            const s = r.summary || {};
            console.log("bot v" + (r.botVersion || "?") + " · summary:\n" + JSON.stringify(s, null, 2));
            const db = s.totalPlacedDB;          // null if every game room was raced-out before the DB read
            const proxy = s.totalPlaced ?? 0;    // proxy counter (counts attempts · Rule 53 caveat)
            if (typeof db === "number" && db > 0) {
              console.log("PASS · " + db + " elements DB-VERIFIED across the run (proxy " + proxy + " · dbVerified=" + s.dbVerified + ").");
              if (s.dbVerified === false) console.log("NOTE · proxy != DB (over-count · informational · not a placement failure).");
              process.exit(0);
            }
            if (db == null && proxy > 0) {
              console.log("SOFT-PASS · bot placed " + proxy + " (proxy) but every room was purged before the DB read");
              console.log("           (room-lifecycle race · T3 S14 Task B · environmental). Re-run to DB-verify.");
              process.exit(0);
            }
            console.error("FAIL · no machine placement reached the board (proxy=" + proxy + ", db=" + db + "). Placement chain regressed — inspect the uploaded report.");
            process.exit(1);
          '

      # ── FLOW MODE (T3 S18 · Task B) ──────────────────────────────────────────────────────────────────
      # Runs AFTER the Classic check + assert (so the Classic grader reads its own report · this run writes a
      # separate report-*.json). BOT_GAMES=1 is enough: the mode is persisted at startGame (BEFORE any
      # placement) and the bot reads game_sessions.mode DURING the game (before any teardown), so DB-verify is
      # reliable at N=1 · BOT_TURNS + BOT_URL inherit from the job env.
      - name: Run bot Flow mode game (1 game vs production · BOT_MODE=flow)
        env:
          BOT_GAMES: '1'
          BOT_MODE: 'flow'
        run: node scripts/bot-simulate.js

      # Grade the FLOW run honestly (mirrors the Classic grader's gentle tolerance · Rule 53/63):
      #   flowDbVerified            → PASS      (game_sessions.mode='flow' · the real toggle reached Postgres)
      #   toggle found, not DB-verified → SOFT-PASS (room-race / unclean finish · environmental · re-run)
      #   toggle NOT found          → FAIL      (T1 mode-flow toggle regressed · bot silently ran Classic)
      - name: Assert Flow mode persisted (game_sessions.mode = flow)
        run: |
          node -e '
            const fs = require("fs");
            const dir = ".bot-reports";
            const files = fs.existsSync(dir) ? fs.readdirSync(dir).filter(f => f.startsWith("report-")).sort() : [];
            // Select the FLOW report by CONTENT (requestedMode==="flow"), not by position (Rule 67 · key on truth).
            let flow = null;
            for (const f of files) {
              try { const r = JSON.parse(fs.readFileSync(dir + "/" + f, "utf8")); if ((r.requestedMode || (r.summary && r.summary.requestedMode)) === "flow") flow = r; } catch (e) {}
            }
            if (!flow) { console.error("FAIL: no BOT_MODE=flow report found — the Flow bot run produced nothing (it likely crashed before writing)."); process.exit(1); }
            const s = flow.summary || {};
            console.log("bot v" + (flow.botVersion || "?") + " · flow summary:\n" + JSON.stringify({ flowToggleFound: s.flowToggleFound, flowDbVerified: s.flowDbVerified, dbModeBreakdown: s.dbModeBreakdown, completed: s.completed }, null, 2));
            if (s.flowDbVerified === true) {
              console.log("PASS · a Flow game was DB-VERIFIED (game_sessions.mode=flow · the real lobby toggle reached Postgres).");
              process.exit(0);
            }
            if (s.flowToggleFound === true) {
              console.log("SOFT-PASS · the Flow toggle WAS found + selected, but no Flow session was DB-verified this run");
              console.log("           (room-lifecycle race or the game did not start/finish cleanly · environmental · T3 S14 Task B). Re-run to DB-verify.");
              process.exit(0);
            }
            console.error("FAIL · the Flow lobby toggle (data-testid mode-flow) was NOT found — T1 Flow toggle (5d759aa) regressed · the bot fell back to Classic.");
            process.exit(1);
          '

      - name: Upload bot report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-report-${{ github.run_id }}
          path: .bot-reports/
          include-hidden-files: true   # .bot-reports/ is dot-prefixed · upload-artifact@v4 skips hidden paths by default
          retention-days: 14
