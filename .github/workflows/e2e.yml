name: NeoTopia E2E

# Realtime reconnect proofs (Playwright · headless chromium). Separate from canary.yml's unit gate
# so a heavier browser run never blocks the fast quality gate · and so its logs/artifacts stand alone.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  reconnect:
    name: Reconnect E2E
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Run reconnect E2E
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
